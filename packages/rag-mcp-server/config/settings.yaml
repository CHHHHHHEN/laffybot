# RAG MCP Server Configuration
# =============================================================================
# Embedding Configuration
# =============================================================================
embedding_model: "text-embedding-v4"
embedding_api_key: "sk-366bfa296ebb4dbab198cbc417018d29"
embedding_api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store_type: "chroma"
vector_store_path: "./rag_vectors"
collection_name: "laffybot_docs"

# =============================================================================
# Document Chunking
# =============================================================================
chunk_size: 512
chunk_overlap: 50

# =============================================================================
# Retrieval Configuration
# =============================================================================
default_top_k: 5
dense_top_k: 20
sparse_top_k: 20
rrf_k: 60

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  provider: "none"  # "none", "sentence_transformer", "llm", "cohere"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

# =============================================================================
# File Watch Configuration
# =============================================================================
watch:
  enabled: true
  paths: []
  debounce_ms: 1000

# =============================================================================
# Server Configuration
# =============================================================================
sse_host: "0.0.0.0"
sse_port: 8000
log_level: "INFO"
# log_file: "./logs/rag_mcp_server.log"

# =============================================================================
# Document Indexing Configuration
# =============================================================================
document_paths:
  - "./docs"
include_patterns:
  - "**/*.md"
  - "**/*.txt"
  - "**/*.pdf"
exclude_patterns:
  - "**/node_modules/**"
  - "**/__pycache__/**"
allowed_extensions:
  - ".md"
  - ".txt"
  - ".pdf"
  - ".py"
  - ".js"
  - ".ts"
  - ".tsx"
  - ".json"
  - ".yaml"
  - ".yml"
  - ".toml"
  - ".rst"
