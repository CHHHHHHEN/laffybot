[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "laffybot-agent-runtime"
version = "0.1.0"
description = "Agent execution engine extracted from laffybot"
requires-python = ">=3.12"
dependencies = [
    "loguru",
    "pydantic",
    "openai",
    "httpx",
    "httpx_sse",
    "json-repair",
    "jinja2",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["laffybot_agent_runtime*"]

[tool.coverage.run]
source = ["laffybot_agent_runtime"]
omit = ["tests/*", "**/tests/*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true
exclude = ["third-party/"]
mypy_path = ["src"]

[[tool.mypy.overrides]]
module = "tests.*"
strict = false
